<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Oda a Colombia — Catálogo</title>
<style>
  :root{
    --espresso:#2C2219;
    --espresso-deep:#19120C;
    --cream:#F4F0E5;
    --cream-dim:#cabfa8;
    --y:#F2C84B;
    --b:#2455A4;
    --r:#C0382B;
    --ui-sans:"Helvetica Neue",Arial,system-ui,sans-serif;
    --shadow:0 30px 60px -12px rgba(0,0,0,.62), 0 8px 22px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:var(--ui-sans);
    color:var(--cream);
    background:
      radial-gradient(120% 90% at 50% 36%, #3a2d20 0%, #261c13 46%, var(--espresso-deep) 100%);
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* faint paper grain / atmosphere */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:radial-gradient(140% 120% at 50% 40%, transparent 55%, rgba(0,0,0,.45) 100%);
  }

  /* ---------- Header ---------- */
  header{
    position:fixed;top:0;left:0;right:0;z-index:30;
    display:flex;align-items:center;justify-content:space-between;
    padding:14px clamp(14px,3vw,30px);
    background:linear-gradient(to bottom, rgba(20,14,9,.82), rgba(20,14,9,0));
    backdrop-filter:blur(2px);
  }
  .brand{display:flex;align-items:center;gap:12px;user-select:none}
  .brand .word{
    font-weight:700;letter-spacing:.34em;font-size:clamp(11px,1.5vw,14px);
    text-transform:uppercase;line-height:1.15;
  }
  .brand .rule{width:1px;height:26px;background:rgba(244,240,229,.45)}
  .dots{display:flex;flex-direction:column;gap:3px}
  .dots i{width:8px;height:8px;border-radius:50%;display:block}
  .dots i:nth-child(1){background:var(--y)}
  .dots i:nth-child(2){background:var(--b)}
  .dots i:nth-child(3){background:var(--r)}

  .index-btn{
    appearance:none;border:1px solid rgba(244,240,229,.4);
    background:rgba(244,240,229,.06);color:var(--cream);
    font-family:inherit;font-size:12px;letter-spacing:.22em;text-transform:uppercase;
    padding:9px 16px;border-radius:999px;cursor:pointer;display:flex;align-items:center;gap:9px;
    transition:background .25s,border-color .25s;
  }
  .index-btn:hover{background:rgba(244,240,229,.14);border-color:var(--cream)}
  .index-btn svg{width:14px;height:14px}

  /* ---------- Stage ---------- */
  #stage{
    position:absolute;inset:0;z-index:5;
    display:flex;align-items:center;justify-content:center;
    padding:74px 14px 76px;
  }
  #book{ box-shadow:var(--shadow); background-color:var(--espresso); }
  #book img{ width:100%; height:100%; display:block; }
  /* Pages with no artwork (the leaf opposite the cover and the back page) render
     in brand espresso instead of white. Page images fully cover their own page,
     so this only shows on the otherwise-blank backing leaf. */
  .stf__wrapper, .stf__block, .stf__item, .stf__item > div{ background-color:var(--espresso) !important; }

  /* hint toast */
  #hint{
    position:fixed;left:50%;bottom:88px;transform:translateX(-50%);z-index:25;
    background:rgba(20,14,9,.78);border:1px solid rgba(244,240,229,.18);
    color:var(--cream-dim);font-size:12px;letter-spacing:.06em;
    padding:9px 16px;border-radius:999px;opacity:0;transition:opacity .6s;
    pointer-events:none;white-space:nowrap;
  }
  #hint.show{opacity:1}

  /* ---------- Footer controls ---------- */
  footer{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    display:flex;align-items:center;justify-content:center;gap:18px;
    padding:14px clamp(14px,3vw,30px) calc(14px + env(safe-area-inset-bottom));
    background:linear-gradient(to top, rgba(20,14,9,.82), rgba(20,14,9,0));
  }
  .nav{
    appearance:none;border:1px solid rgba(244,240,229,.35);
    background:rgba(244,240,229,.05);color:var(--cream);
    width:46px;height:46px;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    transition:background .2s,border-color .2s,transform .2s;
  }
  .nav:hover{background:rgba(244,240,229,.16);border-color:var(--cream)}
  .nav:active{transform:scale(.93)}
  .nav svg{width:18px;height:18px}
  .counter{
    min-width:96px;text-align:center;font-size:13px;letter-spacing:.18em;
    color:var(--cream-dim);font-variant-numeric:tabular-nums;
  }
  .counter b{color:var(--cream);font-weight:700}
  .util{position:fixed;right:clamp(14px,3vw,30px);bottom:calc(20px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:31}
  .util .nav{width:40px;height:40px}
  .util .nav svg{width:16px;height:16px}

  /* ---------- Index drawer ---------- */
  #scrim{
    position:fixed;inset:0;z-index:40;background:rgba(10,7,4,.55);
    backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:opacity .3s,visibility .3s;
  }
  #scrim.open{opacity:1;visibility:visible}
  #drawer{
    position:fixed;top:0;right:0;bottom:0;z-index:50;width:min(420px,90vw);
    background:var(--cream);color:var(--espresso);
    transform:translateX(100%);transition:transform .42s cubic-bezier(.4,.0,.1,1);
    display:flex;flex-direction:column;box-shadow:-20px 0 60px rgba(0,0,0,.5);
    overflow-y:auto;
  }
  #drawer.open{transform:translateX(0)}
  .drawer-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:26px 28px 18px;
  }
  .drawer-head h2{
    margin:0;font-size:12px;letter-spacing:.34em;text-transform:uppercase;font-weight:700;
  }
  .close{appearance:none;border:none;background:none;cursor:pointer;color:var(--espresso);padding:6px;line-height:0}
  .close svg{width:20px;height:20px}
  .toc{padding:4px 16px 30px;display:flex;flex-direction:column}
  .eyebrow{
    font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:#9a8a6f;
    padding:18px 12px 8px;
  }
  .row{
    display:flex;align-items:baseline;gap:14px;width:100%;text-align:left;
    background:none;border:none;cursor:pointer;font-family:inherit;color:inherit;
    padding:13px 12px;border-radius:10px;transition:background .18s;
  }
  .row:hover{background:rgba(44,34,25,.07)}
  .row .num{
    flex:0 0 auto;width:34px;font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--espresso);
  }
  .row .meta{flex:1 1 auto;min-width:0}
  .row .label{font-size:16px;font-weight:600;line-height:1.2}
  .row .sub{font-size:12.5px;color:#7c6e58;margin-top:3px;font-style:italic}
  .row .pg{flex:0 0 auto;font-size:12px;color:#9a8a6f;letter-spacing:.1em;font-variant-numeric:tabular-nums}
  .toc hr{border:none;border-top:1px solid rgba(44,34,25,.12);margin:6px 12px}

  .err{
    position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:20;
    max-width:300px;text-align:center;color:var(--cream-dim);font-size:14px;line-height:1.5;
  }

  @media (max-width:560px){
    .brand .word{letter-spacing:.24em}
    .counter{min-width:84px}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition-duration:.001ms !important}
  }
</style>
</head>
<body>
  <header>
    <div class="brand" title="Oda a Colombia">
      <span class="word">ODA&nbsp;A<br>COLOMBIA</span>
      <span class="rule"></span>
      <span class="dots"><i></i><i></i><i></i></span>
    </div>
    <button class="index-btn" id="openIndex" aria-haspopup="dialog">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
      Índice
    </button>
  </header>

  <main id="stage">
    <div id="book" role="region" aria-label="Catálogo Oda a Colombia"></div>
    <div class="err" id="err" hidden></div>
  </main>

  <div id="hint">Arrastra la esquina o usa las flechas para pasar la página</div>

  <footer>
    <button class="nav" id="prev" aria-label="Página anterior">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="counter" id="counter"><b>Portada</b></div>
    <button class="nav" id="next" aria-label="Página siguiente">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </footer>

  <div class="util">
    <button class="nav" id="full" aria-label="Pantalla completa">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3M16 3h3a2 2 0 0 1 2 2v3M21 16v3a2 2 0 0 1-2 2h-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
    </button>
  </div>

  <!-- Index drawer -->
  <div id="scrim"></div>
  <aside id="drawer" role="dialog" aria-modal="true" aria-label="Índice del catálogo">
    <div class="drawer-head">
      <h2>Índice</h2>
      <button class="close" id="closeIndex" aria-label="Cerrar índice">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>
    <nav class="toc" id="toc"></nav>
  </aside>

<script>const PAGES = ["pages/01.jpg", "pages/02.jpg", "pages/03.jpg", "pages/04.jpg", "pages/05.jpg", "pages/06.jpg", "pages/07.jpg", "pages/08.jpg", "pages/09.jpg", "pages/10.jpg", "pages/11.jpg", "pages/12.jpg", "pages/13.jpg", "pages/14.jpg", "pages/15.jpg", "pages/16.jpg", "pages/17.jpg", "pages/18.jpg", "pages/19.jpg", "pages/20.jpg", "pages/21.jpg", "pages/22.jpg", "pages/23.jpg", "pages/24.jpg"];</script>
<script>
(function(){
  "use strict";
  var TOTAL = PAGES.length;

  // Index targets -> 0-based page index in PAGES (file order 2.png..21.png = printed 01..20)
  var TOC = [
    {grp:"Inicio"},
    {num:"",    label:"Portada", sub:"2026 · Vol 1", page:1, pg:"—"},
    {num:"",    label:"Contenido", sub:"", page:3, pg:"01"},
    {num:"",    label:"Meet Oda a Colombia",  sub:"Aquello que nos identifica", page:5, pg:"03"},
    {grp:"Capítulos"},
    {num:"I",   label:"El placer de crear con las manos", sub:"Crochet y tejido", page:6,  pg:"04"},
    {num:"II",  label:"Sounds of Nature", sub:"De tierra brava, belleza pura", page:12, pg:"10"},
    {num:"III", label:"Sabiduría popular", sub:"Dichos que vestimos", page:18, pg:"16"},
    {grp:"Colecciones"},
    {num:"",    label:"Camisetas", sub:"Flora y fauna de Colombia", page:15, pg:"13"},
    {num:"",    label:"Tote bags", sub:"Lienzo, algodón y drill", page:20, pg:"18"},
    {grp:"Contacto"},
    {num:"",    label:"Contáctanos", sub:"Redes sociales y WhatsApp", page:23, pg:"21"}
  ];

  var bookEl = document.getElementById('book');
  var stageEl = document.getElementById('stage');
  var counterEl = document.getElementById('counter');
  var pageFlip = null, fallback = null;

  /* ---------- responsive fit ---------- */
  var RATIO = 1414/2000; // page width / height
  function isPortrait(){ return window.innerWidth < 820; }
  function fit(){
    var availW = stageEl.clientWidth - 28;
    var availH = stageEl.clientHeight - 28;
    var w;
    if(isPortrait()) w = Math.min(availW, availH*RATIO);
    else w = Math.min(availW, availH*2*RATIO);
    bookEl.style.width = Math.max(180, w) + 'px';
    if(pageFlip){ try{ pageFlip.update(); }catch(e){} }
    if(fallback) fallback.layout();
  }

  function setCounter(idx){
    idx = Math.max(0, Math.min(PAGES.length-1, idx));
    var ps = idx - (idx & 1);            // start of the visible spread
    if(ps===0){ counterEl.innerHTML = '<b>Portada</b>'; }
    else if(ps===2){ counterEl.innerHTML = '<b>01</b> / 21'; }
    else { counterEl.innerHTML = '<b>'+String(ps-2).padStart(2,'0')+'</b> / 21'; }
  }

  /* =========================================================
     PRIMARY ENGINE — StPageFlip (realistic curl + drag)
     ========================================================= */
  function initFlip(){
    var PF = (window.St && window.St.PageFlip) || window.PageFlip;
    pageFlip = new PF(bookEl, {
      width: 550, height: 778,
      size: 'stretch',
      minWidth: 200, maxWidth: 2200,
      minHeight: 280, maxHeight: 3200,
      maxShadowOpacity: 0.5,
      showCover: false,
      usePortrait: true,
      autoSize: true,
      mobileScrollSupport: false,
      drawShadow: true,
      flippingTime: 800,
      swipeDistance: 28
    });
    pageFlip.loadFromImages(PAGES);
    fit();
    setCounter(0);
    var last = 0;
    pageFlip.on('flip', function(e){ setCounter(e.data); last=e.data; });

    document.getElementById('prev').onclick = function(){ pageFlip.flipPrev(); };
    document.getElementById('next').onclick = function(){ pageFlip.flipNext(); };
    window.goTo = function(p){ try{ pageFlip.flip(p); }catch(e){ pageFlip.turnToPage(p); } setTimeout(function(){ setCounter(pageFlip.getCurrentPageIndex()); }, 50); };
    showHint();
  }

  /* =========================================================
     FALLBACK ENGINE — single-page CSS 3D flip (no network)
     ========================================================= */
  function initFallback(){
    bookEl.style.perspective = '2000px';
    bookEl.style.position = 'relative';
    var cur = 0, busy = false;
    function pageImg(i){ var im=document.createElement('img'); im.src=PAGES[i]; im.draggable=false; im.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;backface-visibility:hidden'; return im; }
    function render(){
      bookEl.innerHTML='';
      bookEl.appendChild(pageImg(cur));
      setCounter(cur);
    }
    function turn(dir){
      if(busy) return;
      var to = cur + dir;
      if(to<0 || to>=TOTAL) return;
      busy = true;
      var leaf = document.createElement('div');
      leaf.style.cssText='position:absolute;inset:0;transform-style:preserve-3d;transition:transform .7s cubic-bezier(.4,0,.2,1);transform-origin:'+(dir>0?'left':'right')+' center;z-index:5';
      var front = pageImg(dir>0?cur:to);
      var back  = pageImg(dir>0?to:cur);
      back.style.transform='rotateY(180deg)';
      var sh=document.createElement('div'); sh.style.cssText='position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,0),rgba(0,0,0,.35));backface-visibility:hidden;opacity:0;transition:opacity .7s';
      leaf.appendChild(front); leaf.appendChild(sh); leaf.appendChild(back);
      bookEl.innerHTML=''; bookEl.appendChild(pageImg(dir>0?to:cur)); bookEl.appendChild(leaf);
      requestAnimationFrame(function(){ requestAnimationFrame(function(){ leaf.style.transform='rotateY('+(dir>0?-180:180)+'deg)'; sh.style.opacity='1'; }); });
      setTimeout(function(){ cur=to; busy=false; render(); }, 720);
    }
    fallback = { layout:function(){}, };
    render();
    document.getElementById('prev').onclick=function(){ turn(-1); };
    document.getElementById('next').onclick=function(){ turn(1); };
    window.goTo=function(p){ if(busy)return; cur=Math.max(0,Math.min(TOTAL-1,p)); render(); };
    showHint();
  }

  /* ---------- load StPageFlip from sanctioned CDNs, else fallback ---------- */
  var SRC = [
    'https://cdnjs.cloudflare.com/ajax/libs/page-flip/2.0.7/js/page-flip.browser.min.js',
    'https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js',
    'https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js'
  ];
  function loadSeq(i){
    if(i>=SRC.length){ initFallback(); return; }
    var s=document.createElement('script'); s.src=SRC[i];
    s.onload=function(){ if((window.St&&window.St.PageFlip)||window.PageFlip){ initFlip(); } else { loadSeq(i+1); } };
    s.onerror=function(){ loadSeq(i+1); };
    document.head.appendChild(s);
  }
  loadSeq(0);

  /* ---------- build index drawer ---------- */
  var toc = document.getElementById('toc');
  TOC.forEach(function(item){
    if(item.grp){ var e=document.createElement('div'); e.className='eyebrow'; e.textContent=item.grp; toc.appendChild(e); return; }
    var b=document.createElement('button'); b.className='row';
    b.innerHTML='<span class="num">'+(item.num||'')+'</span>'+
      '<span class="meta"><span class="label">'+item.label+'</span>'+(item.sub?'<span class="sub">'+item.sub+'</span>':'')+'</span>'+
      '<span class="pg">'+item.pg+'</span>';
    b.onclick=function(){ if(window.goTo) window.goTo(item.page); closeDrawer(); };
    toc.appendChild(b);
  });

  /* ---------- drawer open/close ---------- */
  var scrim=document.getElementById('scrim'), drawer=document.getElementById('drawer');
  function openDrawer(){ scrim.classList.add('open'); drawer.classList.add('open'); }
  function closeDrawer(){ scrim.classList.remove('open'); drawer.classList.remove('open'); }
  document.getElementById('openIndex').onclick=openDrawer;
  document.getElementById('closeIndex').onclick=closeDrawer;
  scrim.onclick=closeDrawer;

  /* ---------- fullscreen ---------- */
  document.getElementById('full').onclick=function(){
    if(!document.fullscreenElement){ (document.documentElement.requestFullscreen||function(){})(); }
    else if(document.exitFullscreen){ document.exitFullscreen(); }
  };

  /* ---------- keyboard ---------- */
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape') closeDrawer();
    if(e.key==='ArrowRight') document.getElementById('next').click();
    if(e.key==='ArrowLeft') document.getElementById('prev').click();
    if(e.key==='Home' && window.goTo) window.goTo(0);
    if(e.key==='End' && window.goTo) window.goTo(TOTAL-1);
  });

  /* ---------- hint ---------- */
  function showHint(){
    var h=document.getElementById('hint');
    setTimeout(function(){ h.classList.add('show'); }, 700);
    setTimeout(function(){ h.classList.remove('show'); }, 5200);
  }

  /* ---------- resize ---------- */
  var rt; window.addEventListener('resize', function(){ clearTimeout(rt); rt=setTimeout(fit, 160); });
  window.addEventListener('orientationchange', function(){ setTimeout(fit, 300); });
})();
</script>
</body>
</html>
